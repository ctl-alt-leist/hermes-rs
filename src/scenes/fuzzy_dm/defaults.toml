# Fuzzy dark matter: wavefunction + self-gravity in a 10 Mpc box.

[simulation]
n_grid       = 64
n_particles  = 1          # not used for field content
box_length   = 10000.0    # 10 Mpc in kpc

[time]
scale_factor_initial = 0.0909  # z ~ 10
scale_factor_final   = 1.0     # z = 0
stepping             = "linear_a"
