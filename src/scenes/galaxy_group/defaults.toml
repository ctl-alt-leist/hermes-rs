# Galaxy group: 3 colliding NFW halos in an 8 Mpc box.

[simulation]
n_grid       = 32
n_particles  = 32
box_length   = 8000.0     # 8 Mpc in kpc

[time]
scale_factor_initial = 1.0    # z = 0
scale_factor_final   = 2.5    # ~15 Gyr forward
n_steps              = 600
stepping             = "linear_a"
