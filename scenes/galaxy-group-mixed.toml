# Galaxy group (mixed particle + field).
#
# Three colliding NFW dark matter halos in an 8 Mpc box.
# Half the cosmological mass is in N-body particles, half in a
# Schrodinger field. Both are initialized from the same NFW
# density profile with the same halo geometry and infall velocities.
# The two representations coexist under shared Poisson gravity.

# ── Ontology ─────────────────────────────────────────

[ontology.spacetime]
background     = "flrw"
hubble         = 67.4      # km/s/Mpc
omega_m        = 0.315
omega_v        = 0.6849085
omega_b        = 0.0493
sigma_8        = 0.811
spectral_index = 0.965

[ontology.particles."dark matter particles"]
symbol = "α_p"
n      = 32            # particles per side (32³ = 32768 total)
mass   = 1e10          # M_sun per particle (adjusted for half-density)

[ontology.fields."dark matter field"]
symbol       = "α"
grade        = [0, 3]      # even subalgebra
mass         = 1e10        # M_sun
length_scale = 4000.0      # l/m: diffusivity (kpc² / Gyr)
free         = "schrodinger"

[[ontology.coupling]]
kind    = "gravity"
species = ["dark matter particles", "dark matter field"]

# ── Simulation ───────────────────────────────────────

[simulation.grid]
n_cells    = 64
box_length = 8000.0  # kpc (8 Mpc)

[simulation.time]
scale_factor_range = [0.5, 3.0]
stepping           = "linear"
n_steps            = 500

[simulation.initialization]
method = "nfw-group"
seed   = 42

[[simulation.initialization.halos]]
mass_fraction = 0.5263     # 1.0 / 1.9
concentration = 8.0

[[simulation.initialization.halos]]
mass_fraction = 0.3158     # 0.6 / 1.9
concentration = 10.0

[[simulation.initialization.halos]]
mass_fraction = 0.1579     # 0.3 / 1.9
concentration = 14.0

# ── Output ───────────────────────────────────────────

[output.snapshots]
interval = 1

[output.diagnostics]
interval = 10

[output.display]
blob_size = 28.0

[output.display.species."dark matter particles"]
colormap = "cool"

[output.display.species."dark matter field"]
colormap = "ember"
