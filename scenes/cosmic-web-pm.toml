# Cosmic web (particle-mesh).
#
# N-body dark matter in a 100 Mpc periodic box with Eisenstein-Hu
# power spectrum initial conditions.

# ── Ontology ─────────────────────────────────────────

[ontology.spacetime]
background     = "flrw"
hubble         = 67.4    # km/s/Mpc
omega_m        = 0.315
omega_v        = 0.6849085
omega_b        = 0.0493
sigma_8        = 0.811
spectral_index = 0.965

[ontology.particles."dark matter"]
symbol = "α"
n      = 64        # particles per side (64³ total)
mass   = 1e10      # M_sun per particle

[[ontology.coupling]]
kind    = "gravity"
species = ["dark matter"]

# ── Simulation ───────────────────────────────────────

[simulation.grid]
n_cells    = 64
box_length = 100000.0  # kpc (100 Mpc)

[simulation.time]
scale_factor_range = [0.02, 1.0]  # z ~ 49 to z = 0
stepping           = "log"
n_steps            = 600

[simulation.initialization]
method   = "zeldovich"
seed     = 42
spectrum = "eisenstein-hu"

# ── Output ───────────────────────────────────────────

[output.snapshots]
interval = 5

[output.diagnostics]
interval = 10

[output.display.species."dark matter"]
colormap = "cool"
