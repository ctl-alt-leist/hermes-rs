# Multi-species cosmological simulation (aspirational).
#
# Dark matter particles, a dark matter field, a baryon field, and
# an electromagnetic bivector field. Gravity couples everything
# massive; electromagnetism couples baryons to the EM field.

# ── Ontology ─────────────────────────────────────────

[ontology.spacetime]
background     = "flrw"
hubble         = 67.4    # km/s/Mpc
omega_m        = 0.315
omega_v        = 0.6849085
omega_b        = 0.0493
sigma_8        = 0.811
spectral_index = 0.965

[ontology.particles."dark matter particles"]
symbol = "α_p"
n      = 64        # particles per side (64³ total)
mass   = 1e10      # M_sun

[ontology.fields."dark matter"]
symbol       = "α"
grade        = [0, 3]      # even subalgebra
mass         = 1e10        # M_sun
length_scale = 2000.0      # kpc² / Gyr
free         = "schrodinger"

[ontology.fields."baryonic matter"]
symbol       = "β"
grade        = [0, 3]      # even subalgebra (baryon fluid)
mass         = 1e6         # M_sun
length_scale = 500.0       # kpc² / Gyr
free         = "euler"

[ontology.fields."magnetic field"]
symbol = "γ"
grade  = 2         # bivector
free   = "maxwell"

[[ontology.coupling]]
kind    = "gravity"
species = ["dark matter particles", "dark matter", "baryonic matter"]

[[ontology.coupling]]
kind    = "electromagnetic"
species = ["baryonic matter", "magnetic field"]

# ── Simulation ───────────────────────────────────────

[simulation.grid]
n_cells    = 128
box_length = 100000.0  # kpc (100 Mpc)

[simulation.time]
scale_factor_range = [0.02, 1.0]  # z ~ 49 to z = 0
stepping           = "log"
n_steps            = 500

[simulation.initialization]
method   = "zeldovich"
seed     = 42
spectrum = "eisenstein-hu"

# ── Output ───────────────────────────────────────────

[output.snapshots]
interval = 1

[output.diagnostics]
interval = 10

[output.display.species."dark matter"]
colormap = "cool"

[output.display.species."baryonic matter"]
colormap = "ember"

[output.display.species."magnetic field"]
colormap = "verdant"
