# Galaxy group (two-field theory).
#
# Three colliding NFW dark matter halos in an 8 Mpc box.
# Two matter fields: alpha (dark matter) and beta (baryons).
# Both are even-subalgebra Schrodinger fields under shared
# Poisson gravity. Beta carries a Gross-Pitaevskii self-interaction
# that gives baryons an effective sound speed.
#
# The mass split follows Planck 2018: omega_b / omega_m ~ 0.156,
# so beta carries about 15.6% of the total matter mass, and alpha
# carries the remaining 84.4%.

# ── Ontology ─────────────────────────────────────────

[ontology.spacetime]
background     = "flrw"
hubble         = 67.4      # km/s/Mpc
omega_m        = 0.315
omega_v        = 0.6849085
omega_b        = 0.0493
sigma_8        = 0.811
spectral_index = 0.965

[ontology.fields.alpha]
grade        = [0, 3]      # even subalgebra
mass         = 1e10        # M_sun
length_scale = 4000.0      # l/m: diffusivity (kpc^2 / Gyr)
free         = "schrodinger"

[ontology.fields.beta]
grade            = [0, 3]      # even subalgebra
mass             = 1e10        # M_sun
length_scale     = 4000.0      # l/m: diffusivity (kpc^2 / Gyr)
free             = "schrodinger"
self_interaction = 1e6         # Gross-Pitaevskii coupling g (kpc^3 / Gyr^2 / M_sun)

[ontology.lagrangian]
gravity = true

# ── Simulation ───────────────────────────────────────

[simulation.grid]
n_cells    = 64
box_length = 8000.0  # kpc (8 Mpc)

[simulation.time]
scale_factor_range = [0.5, 3.0]
stepping           = "linear"
n_steps            = 500

[simulation.initialization]
method = "nfw-group"
seed   = 42

[[simulation.initialization.halos]]
mass_fraction = 0.5263     # 1.0 / 1.9
concentration = 8.0

[[simulation.initialization.halos]]
mass_fraction = 0.3158     # 0.6 / 1.9
concentration = 10.0

[[simulation.initialization.halos]]
mass_fraction = 0.1579     # 0.3 / 1.9
concentration = 14.0

# ── Output ───────────────────────────────────────────

[output.snapshots]
interval = 1

[output.diagnostics]
interval = 10

[output.display]
blob_size = 28.0

[output.display.species.alpha]
colormap = "cool"  # blue/purple for dark matter

[output.display.species.beta]
colormap = "ember"  # red/orange/gold for baryons
