# Hermes default configuration.
#
# Planck 2018 cosmology, starter-grade resolution.
# Scene-specific overrides live in src/scenes/*/defaults.toml.
# User overrides: pass a TOML file as the first CLI argument.

[cosmology]
hubble         = 0.674
omega_m        = 0.315
omega_b        = 0.0493
omega_r        = 9.15e-5
omega_k        = 0.0
omega_lambda   = 0.6849085
sigma_8        = 0.811
spectral_index = 0.965

[simulation]
n_grid         = 64          # grid cells per side (N_g^3 total)
n_particles    = 32          # particles per side (N_p^3 total)
box_length     = 100000.0    # comoving box side in kpc (100 Mpc)

[time]
scale_factor_initial = 0.02  # z ~ 49
scale_factor_final   = 1.0   # z = 0
n_steps              = 300
stepping             = "log_a"   # "log_a" or "linear_a"

[output]
write_interval      = 1      # save a snapshot every N steps
diagnostic_interval = 10     # compute full diagnostics every N steps

[visualization]
point_size        = 5.0      # screen-space point size (particles)
blob_size         = 18.0     # screen-space blob size (volumetric fields)
blob_alpha        = 0.12     # per-blob opacity for additive blending
camera_distance   = 1.9      # distance from origin (box is [-0.5, 0.5])
colormap_low      = 0.3      # density / rho_mean for colormap floor
colormap_high     = 3.0      # density / rho_mean for colormap ceiling
jitter            = 0.3      # grid-point jitter as fraction of cell size
